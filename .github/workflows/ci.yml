# GitHub Actions CI Quality Pipeline
# Generated by BMad TEA Agent (bmad-testarch-ci) for the todo-app monorepo.
# Stack: FastAPI (backend, pytest + pytest-cov) + Vite/React/TS (frontend, vitest + v8 coverage)
# + Playwright E2E (guarded on frontend/playwright.config.ts presence).

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend: pytest with coverage gate (>=70%)
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage (fail under 70%)
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=70

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Frontend unit tests: vitest with v8 coverage (thresholds enforced in vite.config.ts)
  # ---------------------------------------------------------------------------
  frontend-unit:
    name: Frontend Unit (vitest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest with coverage (thresholds >=70% in vite.config.ts)
        run: pnpm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # E2E: Playwright (guarded — only runs when frontend/playwright.config.ts exists)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-tests, frontend-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Playwright config
        id: playwright-config
        run: |
          if [ -f frontend/playwright.config.ts ] || [ -f frontend/playwright.config.js ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/playwright.config.ts not present — skipping E2E job."
          fi

      - name: Setup pnpm
        if: steps.playwright-config.outputs.exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        if: steps.playwright-config.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Python (backend for E2E stack)
        if: steps.playwright-config.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        if: steps.playwright-config.outputs.exists == 'true'
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        if: steps.playwright-config.outputs.exists == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        if: steps.playwright-config.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-config.outputs.exists == 'true'
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        if: steps.playwright-config.outputs.exists == 'true'
        run: pnpm --dir frontend test:e2e

      - name: Upload Playwright report
        if: always() && steps.playwright-config.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 30
